schema_version = 1

# A direction is required unless surprise_me is explicitly true.
idea_direction = "A small act of courage in an unusual winter setting"
surprise_me = false

tone = "curious, warm, lightly suspenseful"
themes = ["resourcefulness", "unexpected friendship"]
must_include = ["one visually memorable object"]
avoid = ["chosen-one plots", "moral stated directly"]

# Optional research guidance. Fiction uses research as inspiration, not as claims that
# the story must reproduce literally.
research_focus = ["northern winter folklore", "surprising cold-weather details"]
