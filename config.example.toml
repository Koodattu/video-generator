schema_version = 1

# Curated choices: local, cloud-openai, cloud-gemini, cloud-openai-gemini,
# hybrid-local-first.
profile = "local"

# One language per Run: en or fi.
output_language = "fi"

# This is both the goal and hard limit. The accepted result is 90-100% of it.
duration_seconds = 90

# landscape is 16:9; portrait is 9:16. Choose this before starting a Run.
orientation = "landscape"

# Draft: 1280x720 or 720x1280. Final: 1920x1080 or 1080x1920, at 30 fps.
quality = "draft"
# Independent content axes. mythbuster requires factual mode.
content_mode = "fiction"
content_format = "narrative" # narrative, explainer, or mythbuster
narration_pace = "standard" # slow, standard, or fast
# Optional tone/delivery direction; quantitative pace and pause limits still come from narration_pace.
narration_delivery = ""
audience = "family_safe_general"

# still_image preserves the original generated-still workflow. remotion_explainer uses the fixed
# eight-template, word-anchored Remotion renderer while keeping narration and models local.
video_style = "still_image"

# Built-in starting style. You may use another stable style ID and describe it below.
style = "ms_paint_stick"
style_description = ""
motion_style = "static_cuts"

# Remotion only: stock_preferred tries matching media-library files, Wikimedia Commons, then Pexels,
# and falls back to the configured Image Backend. local_only never contacts stock asset providers.
remotion_asset_policy = "stock_preferred"
# CC BY-SA assets are excluded unless you explicitly accept the resulting ShareAlike obligations.
remotion_allow_share_alike = false
# Stop after retrieved/generated assets until a dashboard approval creates an immutable child Run.
remotion_require_asset_approval = false
# Evidence-page capture is disabled by default. Trust only exact parent hostnames you reviewed;
# listed hosts also permit their subdomains. Example: ["wikipedia.org", "docs.python.org"]
remotion_source_screenshot_hosts = []

# Local inference may still use live search. Set this to true to forbid all network use.
offline = false

# Cloud and hybrid calls stop before their configured worst-case estimate crosses this limit.
cost_ceiling_usd = 10.00
# strict, or omit_with_warning for enabled optional features that may be omitted visibly.
failure_policy = "strict"
usage_purpose = "personal_noncommercial"

idea_candidates = 5
research_query_limit = 5
research_source_limit = 10

visual_target_seconds = 15
visual_min_seconds = 8
visual_max_seconds = 25

# scene_locked preserves one image per editorial Scene. cadenced creates a frame-aligned Shot plan
# after narration and may generate several still images inside one Scene. A single cadenced plan is
# currently capped at 72 generated Shots and oversized configurations are rejected before the Run.
# remotion_explainer always resolves this to cadenced; the saved input remains explicit for stills.
visual_shot_mode = "scene_locked"
shot_target_seconds = 3
shot_min_seconds = 2
shot_max_seconds = 5

# Music is supported but off by default because it adds a large local model or cloud cost.
music_enabled = false
captions_enabled = true
animated_captions = false

[voice]
name = "my_voice"
authorization = "self"
# Keep these files under private/, which is excluded from version control.
reference_audio = "private/voice/me.wav"
reference_transcript = "private/voice/me.txt"
# The language actually spoken in the reference clip. Some retained compatibility Backends,
# including X-Voice, require an exact match; it may differ from output_language.
reference_language = "en"
# Used by profiles that route narration to ElevenLabs. When blank, ELEVENLABS_VOICE_ID
# is loaded from .env or the process environment.
elevenlabs_voice_id = ""

# Advanced per-task overrides remain explicit and opt-in. Ordinary Runs should use a curated profile;
# the resolved Backend descriptors and local runner manifests are frozen into each Run Bundle.
[task_overrides]
# search = "ddgs:duckduckgo"
# research = "local:llama-server"
# script_draft = "openai:gpt-5.6-terra"
# image_prompt_compile = "local:llama-server"
# remotion_rhythm = "local:llama-server"             # One bounded whole-video rhythm pass.
# remotion_direction = "local:llama-server"          # One small creative decision per Shot.
# remotion_asset_select = "local:llama-server"       # One supplied candidate_id only.
# image_generate = "local:flux.2-klein-4b"
# image_generate = "local:z-image-turbo"              # Alternative native-Windows T2I Backend.
# image_generate = "local:ideogram-4-nf4"             # Experimental; gated/noncommercial, no usable smoke.
# image_generate = "local:qwen-image-2512-nf4"        # Experimental; 50 steps at 1664x928, NF4/offload.
# Recommended EN/FI voice; Docker Desktop/WSL2, exact transcript, Boson attribution required:
# narration_synthesis = "local:higgs-tts-3-4b"
# narration_synthesis = "local:voxcpm2"               # Alternative native-Windows EN/FI voice clone.
# narration_synthesis = "local:omnivoice"             # Alternative native-Windows EN/FI voice clone.
# narration_synthesis = "elevenlabs:eleven_multilingual_v2"
# narration_synthesis = "local:moss-tts-v1.5"         # Legacy/lower quality; retained for explicit comparisons.
# narration_synthesis = "local:x-voice"               # Legacy/lower quality; noncommercial weights.
# caption_alignment = "local:parakeet-tdt-0.6b-v3" # Optional WSL2 comparison Backend.
